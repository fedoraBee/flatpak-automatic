# ==============================================================================
# Flatpak Automatic - User-Level Default Configuration
# ==============================================================================
# This file contains the default configuration for rootless user-level execution.
# It is typically installed at /etc/flatpak-automatic/config.user.yaml
# and serves as the base for ~/.config/flatpak-automatic/config.yaml
# ==============================================================================

# ------------------------------------------------------------------------------
# Core Settings
# ------------------------------------------------------------------------------

# Automatically install available updates.
auto_update: true

# List of Flatpak App IDs to exclude from the automatic update process.
exclusions: []

# Notification policy: 'always', 'on-change', 'on-failure', or 'never'.
auto_notify: always

# ------------------------------------------------------------------------------
# Systemd Timer Settings
# ------------------------------------------------------------------------------

timer:
  schedule: daily
  delay: 1h
  minimum_delay: 1h

# ------------------------------------------------------------------------------
# Snapper Snapshot Settings
# ------------------------------------------------------------------------------

snapshots:
  # Rootless users cannot typically create Snapper snapshots of the root filesystem.
  # If the user has a personal Btrfs subvolume and Snapper config (e.g., 'home'),
  # they can enable this and set the snapper_config to 'home'.
  enabled: false
  snapper_config: home

  # Descriptions for pre and post snapshots.
  snapper_descriptions:
    pre: "flatpak-automatic-user-pre"
    post: "flatpak-automatic-user-post"

# ------------------------------------------------------------------------------
# Notification Groups
# ------------------------------------------------------------------------------

notification_policy:
  desktop: true
  mails: false
  webhooks: false
  apprise: false

notification_groups:
  - name: "Default User Notifications"

    title:
      success: "[$(hostname)] Flatpak Automatic (User): $UPDATE_COUNT upgrades installed."
      failure: "[$(hostname)] Flatpak Automatic (User): Update failed!"

    body_template:
      success: default_success.md
      failure: default_failure.md

    desktop:
      title:
        success: "Flatpak Automatic (User): $UPDATE_COUNT upgrades installed."
        failure: "Flatpak Automatic (User): Update failed!"
      body_template:
        success: default_desktop_success.md
        failure: default_desktop_failure.md
