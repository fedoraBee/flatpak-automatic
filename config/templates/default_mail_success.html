<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    color: #333333;
    background-color: #f4f7f6;
    margin: 0;
    padding: 20px;
  }
  .email-wrapper {
    max-width: 600px;
    margin: 0 auto;
    background-color: #ffffff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    border: 1px solid #e1e4e8;
  }
  .header {
    background-color: #2ea44f;
    color: #ffffff;
    padding: 20px 30px;
    text-align: center;
  }
  .header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
  }
  .body-content {
    padding: 30px;
  }
  .body-content p {
    margin: 0 0 15px 0;
    font-size: 16px;
  }
  .details-box {
    background-color: #f6f8fa;
    border-left: 4px solid #2ea44f;
    padding: 15px 20px;
    margin: 20px 0;
    border-radius: 0 4px 4px 0;
    font-size: 14px;
    color: #24292e;
  }
  .details-box h2 {
    margin-top: 0;
    font-size: 16px;
    color: #2ea44f;
  }
  .footer {
    background-color: #fafbfc;
    padding: 20px 30px;
    font-size: 13px;
    color: #586069;
    border-top: 1px solid #e1e4e8;
    font-style: italic;
  }
</style>
</head>
<body>
  <div class="email-wrapper">
    <div class="header">
      <h1>✅ Update Report: Success</h1>
    </div>

    <div class="body-content">
      <p>The <code>flatpak-automatic</code> agent has successfully installed <strong>${UPDATE_COUNT}</strong> updates on the host <strong>${HOSTNAME}</strong>.</p>

      <div class="details-box">
        <h2>Installation Details</h2>
        <pre style="margin: 0; font-family: inherit; white-space: pre-wrap;">${UPDATE_LIST}</pre>
      </div>
    </div>

    <div class="footer">
      System Admin Note: No further action is required.
    </div>

  </div>
</body>
</html>
