<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    color: #333333;
    background-color: #f4f7f6;
    margin: 0;
    padding: 20px;
  }
  .email-wrapper {
    max-width: 600px;
    margin: 0 auto;
    background-color: #ffffff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    border: 1px solid #e1e4e8;
  }
  .header {
    background-color: #d73a49;
    color: #ffffff;
    padding: 20px 30px;
    text-align: center;
  }
  .header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
  }
  .body-content {
    padding: 30px;
  }
  .body-content p {
    margin: 0 0 15px 0;
    font-size: 16px;
  }
  .error-box {
    background-color: #fffbdd;
    border-left: 4px solid #d73a49;
    padding: 15px 20px;
    margin: 20px 0;
    border-radius: 0 4px 4px 0;
  }
  .error-box h2 {
    margin-top: 0;
    font-size: 16px;
    color: #cb2431;
  }
  .log-output {
    background-color: #24292e;
    color: #e1e4e8;
    padding: 15px;
    border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    font-size: 13px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
  }
  .footer {
    background-color: #fafbfc;
    padding: 20px 30px;
    font-size: 13px;
    color: #586069;
    border-top: 1px solid #e1e4e8;
    font-style: italic;
  }
</style>
</head>
<body>
  <div class="email-wrapper">
    <div class="header">
      <h1>❌ Update Report: Failure</h1>
    </div>

    <div class="body-content">
      <p>The <code>flatpak-automatic</code> agent encountered a critical error while attempting to process updates on <strong>${HOSTNAME}</strong>.</p>

      <div class="error-box">
        <h2>Diagnostic Information</h2>
        <p style="font-size: 14px; margin-bottom: 10px;"><strong>Error Output:</strong></p>
        <pre class="log-output">${LOG_OUTPUT}</pre>
      </div>
    </div>

    <div class="footer">
      System Admin Note: Immediate attention may be required to restore automatic system updates.
    </div>

  </div>
</body>
</html>
