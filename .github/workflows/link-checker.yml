name: Link Checker

on:
  schedule:
    - cron: '0 0 * * 0'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.md'
      - '**/*.html'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Lychee Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --max-retries 3 '**/*.md' '**/*.html'
          fail: true
