name: Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  actions: read
  checks: write
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # --- Static Analysis Stage ---
  lint-code:
    name: Lint Source Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Lint Shell Scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './scripts'

      - name: Lint Documentation
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: rpm/.markdownlint.jsonc
          globs: "**/*.md"

      - name: Install shfmt
        run: sudo apt-get install -y shfmt

      - name: Check Shell Formatting
        run: shfmt -d -i 4 -ci scripts/



  lint-python:
    name: Lint Python Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
      - name: Run Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: 'format --check'

  lint-actions:
    name: Lint GitHub Workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install Actionlint
        run: |
          curl -fsSL https://github.com/rhysd/actionlint/releases/download/v1.7.8/actionlint_1.7.8_linux_amd64.tar.gz -o /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          install -m 0755 /tmp/actionlint /usr/local/bin/actionlint

      - name: Execute Actionlint
        run: actionlint -color

  lint-spec:
    name: Lint RPM Specification
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install Build Tools
        run: dnf install -y rpmlint make python3 dpkg-dev debhelper

      - name: Initialize RPM Environment
        run: echo "%_topdir ${{ github.workspace }}/.rpmbuild" > ~/.rpmmacros

      - name: Validate Spec File
        run: make lint-spec

  # --- Build and Validation Stage ---
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
      - name: Install Test Dependencies
        run: sudo apt-get update && sudo apt-get install -y bats python3-pytest
      - name: Run Tests
        run: make test


  build-packages:
    name: Build & Verify RPMs
    needs: [lint-code, lint-actions, lint-spec]
    runs-on: ubuntu-latest
    container: fedora:latest
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'gh-pages' || '' }}
    outputs:
      rpm_artifact_id: ${{ steps.upload_rpms.outputs.artifact-id }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install Build Dependencies
        run: dnf install -y python3 rpm-build systemd-rpm-macros make tar gnupg2 rpm-sign which rpmlint dpkg fakeroot dpkg-dev debhelper

      - name: Compile Packages
        run: |
          make rpm
          make deb

      - name: Configure GPG Signing Key
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Import Private Key
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

          # Configure GPG Agent for automated signing
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "use-agent" > ~/.gnupg/gpg.conf
          echo "allow-preset-passphrase" > ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye

          # Preset passphrase to bypass interactive prompts
          preset_passphrase_bin="$(find /usr/lib* -name gpg-preset-passphrase 2>/dev/null | head -n 1)"
          keygrip="$(gpg --with-keygrip -K | awk '/Keygrip =/ {print $3; exit}')"
          "$preset_passphrase_bin" --passphrase "${{ secrets.GPG_PASSPHRASE }}" --preset "$keygrip"

          # IMPORTANT: Register Public Key in RPM Database to fix 'unknown-key' error in rpmlint
          gpg --export --armor ${{ vars.GPG_KEY_ID }} > /tmp/RPM-GPG-KEY
          rpm --import /tmp/RPM-GPG-KEY

          # Define RPM Macros
          echo "%_signature gpg" > ~/.rpmmacros
          echo "%_gpg_name ${{ vars.GPG_KEY_ID }}" >> ~/.rpmmacros
          echo "%__gpg $(which gpg)" >> ~/.rpmmacros

      - name: Sign RPM Packages
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          GPG_TTY="$(tty || echo /dev/null)" && export GPG_TTY
          make rpm-sign GPG_KEY_ID=${{ vars.GPG_KEY_ID }}

      - name: Audit Build Artifacts
        run: make lint-rpm

      - name: Archive RPM Artifacts
        id: upload_rpms
        uses: actions/upload-artifact@v6
        with:
          name: rpms
          path: .rpmbuild/RPMS/noarch/*.rpm
          retention-days: 5

      - name: Archive DEB Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: debs
          path: "*.deb"
          retention-days: 5

  # --- Testing Stage ---
  smoke-test:
    name: Smoke Test (Fedora ${{ matrix.fedora_version }})
    needs: build-packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fedora_version: [40, 41, 42, rawhide]
    container:
      image: fedora:${{ matrix.fedora_version }}
      options: --privileged
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install Runtime Dependencies
        run: dnf install -y curl unzip systemd shadow-utils util-linux dpkg-dev debhelper

      - name: Retrieve RPM Artifacts
        uses: actions/download-artifact@v4
        with:
          name: rpms
          path: rpms

      - name: Execute Package Installation
        run: dnf install -y rpms/flatpak-automatic-[0-9].*.noarch.rpm dpkg-dev debhelper

      - name: Validate Filesystem Integrity
        run: |
          test -f /etc/sysconfig/flatpak-automatic
          test -f /usr/lib/systemd/system/flatpak-automatic.timer
          test -f /usr/lib/systemd/system/flatpak-automatic.service
          test -f /usr/bin/flatpak-automatic

      - name: Verify Systemd Unit Syntax
        run: |
          systemd-analyze verify /usr/lib/systemd/system/flatpak-automatic.timer
          systemd-analyze verify /usr/lib/systemd/system/flatpak-automatic.service

  # --- Deployment Preparation Stage ---
  build-web-assets:
    name: Generate Repository Site
    needs: build-packages
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'gh-pages' || '' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install Web Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3 python3-pip make createrepo-c git rsync nodejs npm gnupg2 chromium-browser dpkg-dev apt-utils rpm
          python3 -m pip install jinja2 --break-system-packages
          sudo npm install -g htmlhint pa11y

      - name: Retrieve RPM Artifacts
        uses: actions/download-artifact@v4
        with:
          name: rpms
          path: .rpmbuild/RPMS/noarch

      - name: Retrieve DEB Artifacts
        uses: actions/download-artifact@v4
        with:
          name: debs
          path: debs

      - name: Configure Repository Signing
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "use-agent" > ~/.gnupg/gpg.conf
          echo "allow-preset-passphrase" > ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye
          preset_passphrase_bin="$(find /usr/lib* -name gpg-preset-passphrase 2>/dev/null | head -n 1)"
          keygrip="$(gpg --with-keygrip -K | awk '/Keygrip =/ {print $3; exit}')"
          "$preset_passphrase_bin" --passphrase "${{ secrets.GPG_PASSPHRASE }}" --preset "$keygrip"
          echo "%_signature gpg" > ~/.rpmmacros
          echo "%_gpg_name ${{ vars.GPG_KEY_ID }}" >> ~/.rpmmacros
          echo "%__gpg $(which gpg)" >> ~/.rpmmacros

      - name: Update Metadata and Repository
        run: |
          CHANNEL=stable
          [[ "${{ github.ref_name }}" =~ (rc|beta|alpha|test) ]] && CHANNEL=testing
          make rpm-repo GPG_KEY_ID=${{ vars.GPG_KEY_ID }} CHANNEL=$CHANNEL

      - name: Synchronize Legacy Assets
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          ref: gh-pages
          path: public

      - name: Stage Public Files
        run: |
          mkdir -p public/rpms
          cp -r repo/* public/rpms/

      - name: Generate Index Page
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python3 .github/scripts/generate-index.py

      - name: Validate HTML Output
        run: htmlhint public/index.html

      - name: Run Accessibility Audit
        run: |
          echo "{\"chromeLaunchConfig\": {\"executablePath\": \"$(which google-chrome)\", \"args\": [\"--no-sandbox\", \"--disable-setuid-sandbox\", \"--disable-dev-shm-usage\"]}}" > pa11y-config.json
          pa11y --config pa11y-config.json public/index.html

      - name: Archive Public Site
        uses: actions/upload-artifact@v6
        with:
          name: public-site
          path: public/
          retention-days: 5

  # --- Final Release Stage ---
  publish-release:
    name: Publish Release & Pages
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [smoke-test, build-web-assets]
    runs-on: ubuntu-latest
    environment: gh-pages
    steps:
      - name: Retrieve Public Assets
        uses: actions/download-artifact@v4
        with:
          name: public-site
          path: public

      - name: Retrieve RPM Artifacts
        uses: actions/download-artifact@v4
        with:
          name: rpms
          path: rpms

      - name: Retrieve DEB Artifacts
        uses: actions/download-artifact@v4
        with:
          name: debs
          path: debs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public
          keep_files: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rpms/*.rpm
            debs/*.deb
