name: Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  checks: write
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # --- Static Analysis Stage ---
  lint-code:
    name: Lint Source Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Lint Shell Scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './scripts'

      - name: Lint Documentation
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: rpm/.markdownlint.jsonc
          globs: "**/*.md"

      - name: Install shfmt
        uses: mfinelli/setup-shfmt@v3

      - name: Check Shell Formatting
        run: shfmt -d -i 4 -ci scripts/



  lint-python:
    name: Lint Python Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
      - name: Validate tbump versioning configuration
        run: |
          pipx install tbump
          git config --global user.email "ci@example.com"
          git config --global user.name "CI System"
          git checkout -B main
          git fetch origin main
          git branch -u origin/main main
          tbump --non-interactive --dry-run 1.4.7

      - name: Run Ruff Lint
        uses: astral-sh/ruff-action@v3
        with:
          args: 'check scripts/ tests/'
      - name: Run Ruff Format
        uses: astral-sh/ruff-action@v3
        with:
          args: 'format --check scripts/ tests/'
      - name: Run Mypy Type Check
        run: |
          pipx install mypy
          mypy --strict scripts/ tests/
      - name: Run Bandit SAST
        run: |
          pipx install bandit
          bandit -ll -i -r scripts/ tests/ -c .bandit.yml

  lint-actions:
    name: Lint GitHub Workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install Actionlint
        run: |
          curl -fsSL https://github.com/rhysd/actionlint/releases/download/v1.7.8/actionlint_1.7.8_linux_amd64.tar.gz -o /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          install -m 0755 /tmp/actionlint /usr/local/bin/actionlint

      - name: Execute Actionlint
        run: actionlint -color

  lint-spec:
    name: Lint RPM Specification
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install Build Tools
        run: dnf install -y rpmlint make python3 dpkg-dev debhelper python3-yaml

      - name: Initialize RPM Environment
        run: echo "%_topdir ${{ github.workspace }}/.rpmbuild" > ~/.rpmmacros

      - name: Validate Spec File
        run: make lint-spec

  # --- Build and Validation Stage ---
  unit-tests:
    name: Run Unit Tests (${{ matrix.os }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [fedora:latest, debian:latest]
    container:
      image: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
      - name: Install Test Dependencies
        run: |
          if command -v dnf >/dev/null 2>&1; then
            dnf install -y bats python3-pytest make hostname util-linux python3-yaml
          else
            apt-get update && apt-get install -y bats python3-pytest make hostname bsdutils python3-yaml
          fi
      - name: Run Tests
        run: make test


  build-rpm:
    name: Build & Verify RPMs
    needs: [lint-code, lint-actions, lint-spec]
    runs-on: ubuntu-latest
    container: fedora:latest
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'gh-pages' || '' }}
    outputs:
      rpm_artifact_id: ${{ steps.upload_rpms.outputs.artifact-id }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
      - name: Install Build Dependencies
        run: dnf install -y python3 rpm-build systemd-rpm-macros make tar gnupg2 rpm-sign which rpmlint dpkg fakeroot python3-yaml
      - name: Compile Packages
        run: make rpm
      - name: Configure GPG Signing Key
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "use-agent" > ~/.gnupg/gpg.conf
          echo "allow-preset-passphrase" > ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye
          preset_passphrase_bin="$(find /usr/lib* -name gpg-preset-passphrase 2>/dev/null | head -n 1)"
          keygrip="$(gpg --with-keygrip -K | awk '/Keygrip =/ {print $3; exit}')"
          "$preset_passphrase_bin" --passphrase "${{ secrets.GPG_PASSPHRASE }}" --preset "$keygrip"
          gpg --export --armor ${{ vars.GPG_KEY_ID }} > /tmp/RPM-GPG-KEY
          rpm --import /tmp/RPM-GPG-KEY
          echo "%_signature gpg" > ~/.rpmmacros
          echo "%_gpg_name ${{ vars.GPG_KEY_ID }}" >> ~/.rpmmacros
          echo "%__gpg $(which gpg)" >> ~/.rpmmacros
      - name: Sign RPM Packages
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          GPG_TTY="$(tty || echo /dev/null)" && export GPG_TTY
          make rpm-sign GPG_KEY_ID=${{ vars.GPG_KEY_ID }}
      - name: Audit Build Artifacts
        run: make lint-rpm
      - name: Archive RPM Artifacts
        id: upload_rpms
        uses: actions/upload-artifact@v6
        with:
          name: rpms
          path: .rpmbuild/RPMS/noarch/*.rpm
          retention-days: 5

  build-deb:
    name: Build & Verify DEBs
    needs: [lint-code, lint-actions, lint-spec]
    runs-on: ubuntu-latest
    container: debian:latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
      - name: Install Build Dependencies
        run: apt-get update && apt-get install -y dpkg-dev debhelper make python3 tar build-essential lintian python3-yaml
      - name: Compile Packages
        run: make deb
      - name: Run Lintian
        run: lintian debs/*.deb
      - name: Archive DEB Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: debs
          path: "debs/*.deb"
          retention-days: 5

  # --- Testing Stage ---
  smoke-test:
    name: Smoke Test (${{ matrix.os }})
    needs: [build-rpm, build-deb]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [fedora:40, fedora:41, ubuntu:latest, debian:latest]
    container:
      image: ${{ matrix.os }}
      options: --privileged
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
      - name: Install Runtime Dependencies
        run: |
          if [ -f /etc/debian_version ]; then
            apt-get update && apt-get install -y curl unzip systemd
          else
            dnf install -y curl unzip systemd shadow-utils util-linux
          fi
      - name: Retrieve RPM Artifacts
        if: contains(matrix.os, 'fedora')
        uses: actions/download-artifact@v4
        with:
          name: rpms
          path: rpms
      - name: Retrieve DEB Artifacts
        if: contains(matrix.os, 'ubuntu') || contains(matrix.os, 'debian')
        uses: actions/download-artifact@v4
        with:
          name: debs
          path: debs
      - name: Execute Package Installation
        run: |
          if [ -f /etc/debian_version ]; then
            apt-get install -y ./debs/*.deb
          else
            dnf install -y rpms/flatpak-automatic-[0-9].*.noarch.rpm
          fi
      - name: Validate Filesystem Integrity
        run: |
          if [ -f /etc/debian_version ]; then
            test -f /etc/default/flatpak-automatic
            test -f /lib/systemd/system/flatpak-automatic.timer || test -f /usr/lib/systemd/system/flatpak-automatic.timer
            test -f /lib/systemd/system/flatpak-automatic.service || test -f /usr/lib/systemd/system/flatpak-automatic.service
          else
            test -f /etc/sysconfig/flatpak-automatic
            test -f /usr/lib/systemd/system/flatpak-automatic.timer
            test -f /usr/lib/systemd/system/flatpak-automatic.service
          fi
          test -f /usr/bin/flatpak-automatic
      - name: Verify Systemd Unit Syntax
        run: |
          if [ -f /etc/debian_version ]; then
            systemd-analyze verify /lib/systemd/system/flatpak-automatic.timer || systemd-analyze verify /usr/lib/systemd/system/flatpak-automatic.timer
            systemd-analyze verify /lib/systemd/system/flatpak-automatic.service || systemd-analyze verify /usr/lib/systemd/system/flatpak-automatic.service
          else
            systemd-analyze verify /usr/lib/systemd/system/flatpak-automatic.timer
            systemd-analyze verify /usr/lib/systemd/system/flatpak-automatic.service
          fi

  # --- Deployment Preparation Stage ---
  build-web-assets:
    name: Generate Repository Site
    needs: [build-rpm, build-deb]
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'gh-pages' || '' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fix APT Mirrors
        run: |
          sudo sed -i 's/azure\.archive\.ubuntu\.com/archive.ubuntu.com/g' /etc/apt/sources.list
          sudo apt-get update -y

      - name: Install Web Dependencies
        run: |
          sudo apt-get install -y make createrepo-c git rsync gnupg2 dpkg-dev apt-utils rpm python3-yaml
          # Download the official Chrome binary directly, bypassing Snap entirely
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          rm google-chrome-stable_current_amd64.deb
          python3 -m pip install jinja2 --break-system-packages
          npm install -g htmlhint pa11y

      - name: Retrieve RPM Artifacts
        uses: actions/download-artifact@v4
        with:
          name: rpms
          path: .rpmbuild/RPMS/noarch

      - name: Retrieve DEB Artifacts
        uses: actions/download-artifact@v4
        with:
          name: debs
          path: debs

      - name: Configure Repository Signing
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "use-agent" > ~/.gnupg/gpg.conf
          echo "allow-preset-passphrase" > ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye
          preset_passphrase_bin="$(find /usr/lib* -name gpg-preset-passphrase 2>/dev/null | head -n 1)"
          keygrip="$(gpg --with-keygrip -K | awk '/Keygrip =/ {print $3; exit}')"
          "$preset_passphrase_bin" --passphrase "${{ secrets.GPG_PASSPHRASE }}" --preset "$keygrip"
          echo "%_signature gpg" > ~/.rpmmacros
          echo "%_gpg_name ${{ vars.GPG_KEY_ID }}" >> ~/.rpmmacros
          echo "%__gpg $(which gpg)" >> ~/.rpmmacros

      - name: Update Metadata and Repository
        run: |
          CHANNEL=stable
          [[ "${{ github.ref_name }}" =~ (rc|beta|alpha|test) ]] && CHANNEL=testing
          make rpm-repo GPG_KEY_ID=${{ vars.GPG_KEY_ID }} CHANNEL=$CHANNEL

      - name: Synchronize Legacy Assets
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          ref: gh-pages
          path: public

      - name: Export Public GPG Key
        run: gpg --armor --export ${{ vars.GPG_KEY_ID }} > public/gpg.key

      - name: Stage Public Files
        run: |
          cp -r repo/* public/

      - name: Generate Index Page
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python3 scripts/maintainer/generate-index.py

      - name: Validate HTML Output
        run: htmlhint public/index.html

      - name: Run Accessibility Audit
        run: |
          echo "{\"chromeLaunchConfig\": {\"executablePath\": \"$(which google-chrome)\", \"args\": [\"--no-sandbox\", \"--disable-setuid-sandbox\", \"--disable-dev-shm-usage\"]}}" > pa11y-config.json
          pa11y --config pa11y-config.json public/index.html

      - name: Archive Public Site
        uses: actions/upload-artifact@v6
        with:
          name: public-site
          path: public/
          retention-days: 5

  # --- Final Release Stage ---
  publish-release:
    name: Publish Release & Pages
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [smoke-test, build-web-assets]
    runs-on: ubuntu-latest
    environment: gh-pages
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v5
        with:
          ref: gh-pages

      - name: Retrieve Public Assets
        uses: actions/download-artifact@v4
        with:
          name: public-site
          path: public/

      - name: Update gh-pages Content
        run: |
          # Synchronize the artifact content to the gh-pages checkout
          # We use --delete to match the artifact exactly but exclude .git
          rsync -av --delete --exclude .git public/ .
          rm -rf public

      - name: Create Pull Request to gh-pages
        uses: peter-evans/create-pull-request@v7
        with:
          branch: release/gh-pages-update-${{ github.ref_name }}
          base: gh-pages
          title: "chore(release): update repository site for ${{ github.ref_name }}"
          body: |
            Automated update of the repository website and package metadata for release ${{ github.ref_name }}.

            This PR was automatically generated because the `gh-pages` branch is protected.
            Please review and merge to update the live repository.
          commit-message: "chore(release): update repository site for ${{ github.ref_name }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          labels: |
            release
            documentation

      - name: Retrieve RPM Artifacts
        uses: actions/download-artifact@v4
        with:
          name: rpms
          path: rpms

      - name: Retrieve DEB Artifacts
        uses: actions/download-artifact@v4
        with:
          name: debs
          path: debs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rpms/*.rpm
            debs/*.deb

  integration-tests:
    name: System Bus IPC Integration
    runs-on: ubuntu-latest
    container: fedora:latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4
      - name: Install System Dependencies
        run: |
          dnf install -y python3 python3-pytest python3-dbus python3-dbusmock dbus-daemon flatpak python3-yaml
      - name: Run DBus Integration Tests
        run: |
          python3 -m pytest tests/integration_test_dbus.py
