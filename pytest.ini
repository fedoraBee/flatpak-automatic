[pytest]
# Basic configuration
testpaths = tests
pythonpath = src
# Treat warnings as errors to ensure high code quality
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::UserWarning

# Coverage configuration
# --cov: path to the source code to measure
# --cov-report: term-missing for console, xml for CI, html for local dev
# --cov-fail-under: Enforce 85% coverage threshold
addopts =
    --cov=flatpak_automatic
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=85
    --strict-markers
    --tb=short

# Logging configuration during tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S
