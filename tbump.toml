[version]
current = "1.5.17-rc2"
# Updated regex to support X.Y.Z and X.Y.Z-rc1 (or -beta, -alpha)
regex = '''
  (?P<major>\d+)
  \.
  (?P<minor>\d+)
  \.
  (?P<patch>\d+)
  (?:-(?P<prerelease>[a-zA-Z0-9\.]+))?
  '''

[git]
message_template = "chore(release): bump version to {new_version}"
tag_template = "v{new_version}"

# ---------------------------------------------------------
# Hooks: Run scripts automatically during the bump process
# ---------------------------------------------------------
# This runs after files are patched, but BEFORE the git commit is made.
# It uses git-cliff to write the Markdown changelog, then formats that
# into the RPM and Debian spec files automatically.
[[before_commit]]
name = "Generate Changelogs and Package Metadata"
cmd = "python3 scripts/build/update-package-metadata.py --version {new_version} --generate-changelog"

# Pre-run hooks to ensure everything is formatted before tbump tries to commit.
# This prevents failures where hooks modify files during the git commit step.
[[before_commit]]
name = "Pre-commit Formatting & Linting"
cmd = "pre-commit run --all-files || true"

# ---------------------------------------------------------
# Files to patch with the new version
# ---------------------------------------------------------
[[file]]
src = "Makefile"
search = "VERSION := {current_version}"

[[file]]
src = "src/flatpak_automatic/__init__.py"
search = "__version__ = \"{current_version}\""

[[file]]
src = "src/flatpak-automatic.py"
search = "# Version: {current_version}"

[[file]]
src = "src/flatpak_automatic/cli.py"
search = "v{current_version}"

[[file]]
src = "pyproject.toml"
search = "version = \"{current_version}\""

[[file]]
src = "config/sysconfig/flatpak-automatic"
search = "# Version: {current_version}"

[[file]]
src = "assets/banner.svg"
search = "v{current_version}"
